<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Escuela Florece</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2332 0%, #2d3f55 50%, #1a2332 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            background: linear-gradient(135deg, #1a2332, #2d3f55);
            padding: 40px 32px 32px;
            text-align: center;
        }
        .login-icon {
            width: 72px;
            height: 72px;
            background: rgba(78, 154, 241, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 2rem;
        }
        .login-body { padding: 32px; }
        .form-control {
            border-radius: 10px;
            padding: 12px 16px;
            border: 1.5px solid #e0e6ed;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: #4e9af1;
            box-shadow: 0 0 0 3px rgba(78,154,241,0.15);
        }
        .input-group-text {
            border-radius: 10px 0 0 10px;
            background: #f4f6f9;
            border: 1.5px solid #e0e6ed;
            border-right: none;
            color: #6c757d;
        }
        .input-group .form-control { border-radius: 0 10px 10px 0; }
        .btn-login {
            background: linear-gradient(135deg, #4e9af1, #2d7dd2);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(78,154,241,0.4);
        }
        .alert { border-radius: 10px; font-size: 0.875rem; }
        .toggle-password { cursor: pointer; }
    </style>
</head>
<body>
<div class="login-card">
    <!-- Header -->
    <div class="login-header">
        <div class="login-icon">🏫</div>
        <h4 class="text-white mb-1 fw-bold">Escuela Florece</h4>
        <p class="text-secondary mb-0" style="font-size:0.85rem;">Sistema de Gestión Educativa</p>
    </div>

    <!-- Body -->
    <div class="login-body">
        <h6 class="text-muted text-center mb-4">Ingresa tus credenciales</h6>

        <!-- Alertas -->
        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>Email o contraseña incorrectos. Intenta nuevamente.</span>
        </div>
        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-check-circle-fill"></i>
            <span>Sesión cerrada correctamente.</span>
        </div>
        <div th:if="${param.denied}" class="alert alert-warning d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-shield-exclamation"></i>
            <span>No tienes permiso para acceder a esa sección.</span>
        </div>

        <!-- Formulario -->
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold text-dark">Correo electrónico</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" name="username" class="form-control"
                           placeholder="admin@escuelaflorece.edu.pe" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold text-dark">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" id="password"
                           class="form-control" placeholder="••••••••" required>
                    <span class="input-group-text toggle-password" onclick="togglePassword()">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-login btn-primary w-100 text-white">
                <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
            </button>
        </form>

        <p class="text-center text-muted mt-4 mb-0" style="font-size:0.8rem;">
            © 2025 Escuela Florece · Todos los derechos reservados
        </p>
    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
