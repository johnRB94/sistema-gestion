<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Escuela Florece - Formulario Docente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .form-card { border: none; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.08); }
        .top-bar { background: #fff; padding: 12px 24px; border-bottom: 1px solid #e0e6ed; }
        .badge-admin { background-color: #e74c3c !important; }
        .badge-docente { background-color: #2ecc71 !important; }
        .section-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
                         color: #6c757d; letter-spacing: 1px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="top-bar d-flex justify-content-between align-items-center mb-4">
        <h6 class="mb-0 text-muted">🏫 Escuela Florece — Formulario de Docente</h6>
        <div class="d-flex align-items-center gap-2">
            <i class="bi bi-person-circle fs-5 text-secondary"></i>
            <span class="text-dark fw-semibold" th:text="${nombreUsuario}">usuario</span>
            <span class="badge rounded-pill px-3 py-2"
                  th:classappend="${rolUsuario == 'Administrador'} ? 'badge-admin' : 'badge-docente'"
                  th:text="${rolUsuario}">Rol</span>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="d-flex align-items-center mb-4 gap-2">
                    <a href="/docentes" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left"></i> Volver
                    </a>
                    <h4 class="mb-0 ms-2" th:text="${titulo}">Formulario</h4>
                </div>

                <div class="card form-card p-4">
                    <form th:action="@{/docentes/guardar}" th:object="${docente}" method="post">
                        <input type="hidden" th:field="*{id}" />

                        <!-- DATOS PERSONALES -->
                        <p class="section-label"><i class="bi bi-person me-1"></i> Datos Personales</p>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Nombre *</label>
                                <input type="text" th:field="*{nombre}" class="form-control"
                                       placeholder="Ej: María" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Apellido *</label>
                                <input type="text" th:field="*{apellido}" class="form-control"
                                       placeholder="Ej: García López" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email *</label>
                                <input type="email" th:field="*{email}" class="form-control"
                                       placeholder="docente@escuelaflorece.edu.pe" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Teléfono</label>
                                <input type="text" th:field="*{telefono}" class="form-control"
                                       placeholder="Ej: 987654321" maxlength="15" />
                            </div>
                        </div>

                        <!-- DATOS ACADÉMICOS -->
                        <p class="section-label"><i class="bi bi-mortarboard me-1"></i> Datos Académicos</p>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Especialidad Principal</label>
                                <input type="text" th:field="*{especialidad1}" class="form-control"
                                       placeholder="Ej: Matemática" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Especialidad Secundaria</label>
                                <input type="text" th:field="*{especialidad2}" class="form-control"
                                       placeholder="Ej: Física" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Nivel Educativo *</label>
                                <select th:field="*{nivelId}" class="form-select" required>
                                    <option value="">-- Seleccionar Nivel --</option>
                                    <option value="1">Inicial</option>
                                    <option value="2">Primaria</option>
                                    <option value="3">Secundaria</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Fecha de Contratación</label>
                                <input type="date" th:field="*{fechaContratacion}" class="form-control" />
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-2">
                            <button type="submit" class="btn btn-success flex-grow-1">
                                <i class="bi bi-check-circle me-1"></i> Guardar Docente
                            </button>
                            <a href="/docentes" class="btn btn-outline-secondary px-4">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
