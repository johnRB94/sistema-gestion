<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Asistencia - Escuela Florece</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .sidebar { min-height: 100vh; background-color: #1a2332; }
        .sidebar a { color: #a8b8d8; text-decoration: none; padding: 12px 20px; display: block; transition: 0.2s; font-size: 0.9rem; }
        .sidebar a:hover, .sidebar a.active { background-color: #2d3f55; color: #fff; border-left: 3px solid #4e9af1; }
        .content-area { background-color: #f4f6f9; min-height: 100vh; }
        .top-bar { background: #fff; padding: 12px 24px; border-bottom: 1px solid #e0e6ed; }
        .badge-admin { background-color: #e74c3c; }
        .badge-docente { background-color: #2ecc71; }
        .logout-button { background: none; border: none; color: #e74c3c; cursor: pointer; padding: 12px 20px; display: block; width: 100%; text-align: left; transition: 0.2s; font-size: 0.9rem; }
        .logout-button:hover { background-color: #2d3f55; color: #ff6b6b; }
    </style>
</head>
<body>
<div class="container-fluid p-0">
    <div class="row g-0">
        <nav class="col-md-3 col-lg-2 sidebar py-3">
            <div class="text-center mb-4 px-3">
                <h5 class="text-white mb-1">🏫 Escuela Florece</h5>
                <small class="text-secondary">Gestión Educativa</small>
            </div>
            <hr class="border-secondary mx-3">
            <a href="/dashboard"><i class="bi bi-house-door me-2"></i> Inicio</a>
            <a href="/estudiantes"><i class="bi bi-people me-2"></i> Estudiantes</a>
            <div sec:authorize="hasRole('ADMIN')">
                <a href="/docentes"><i class="bi bi-person-badge me-2"></i> Docentes</a>
                <a href="/pagos"><i class="bi bi-cash-coin me-2"></i> Pagos</a>
                <a href="/usuarios"><i class="bi bi-shield-lock me-2"></i> Usuarios</a>
                <a href="/matriculas"><i class="bi bi-card-checklist me-2"></i> Matrículas</a>
            </div>
            <a href="/asistencias" class="active"><i class="bi bi-calendar-check me-2"></i> Asistencias</a>
            <a href="/notas"><i class="bi bi-journal-text me-2"></i> Notas</a>
            <hr class="border-secondary mx-3 mt-4">
            
            <form th:action="@{/logout}" method="post" style="display: block;">
                <button type="submit" class="logout-button">
                    <i class="bi bi-box-arrow-left me-2"></i> Cerrar Sesión
                </button>
            </form>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 content-area">
            <div class="top-bar d-flex justify-content-between align-items-center">
                <h6 class="mb-0 text-muted" th:text="${titulo}">Asistencia</h6>
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-person-circle fs-5 text-secondary"></i>
                    <span class="text-dark fw-semibold" th:text="${nombreUsuario}">usuario</span>
                    <span class="badge rounded-pill px-3 py-2"
                          th:classappend="${rolUsuario == 'Administrador'} ? 'badge-admin' : 'badge-docente'"
                          th:text="${rolUsuario}">Rol</span>
                </div>
            </div>

            <div class="p-4">
                <div class="card border-0 shadow-sm" style="max-width: 560px;">
                    <div class="card-body p-4">
                        <h5 class="mb-4" th:text="${titulo}">Asistencia</h5>
                        <form th:action="@{/asistencias/guardar}" th:object="${asistencia}" method="post">
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Estudiante</label>
                                <select th:field="*{estudianteId}" class="form-select" required>
                                    <option value="">Seleccionar estudiante...</option>
                                    <option th:each="e : ${estudiantes}"
                                            th:value="${e.id}"
                                            th:text="${e.apellido + ', ' + e.nombre}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Curso</label>
                                <select th:field="*{cursoId}" class="form-select" required>
                                    <option value="">Seleccionar curso...</option>
                                    <option th:each="c : ${cursos}"
                                            th:value="${c.id}"
                                            th:text="${c.nombre}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Fecha</label>
                                <input type="date" th:field="*{fecha}" class="form-control" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Estado</label>
                                <select th:field="*{estado}" class="form-select" required>
                                    <option value="Presente">✅ Presente</option>
                                    <option value="Ausente">❌ Ausente</option>
                                    <option value="Tardanza">⚠️ Tardanza</option>
                                </select>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-save me-1"></i> Guardar
                                </button>
                                <a href="/asistencias" class="btn btn-outline-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
