<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escuela Florece - Estudiantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .sidebar { min-height: 100vh; background-color: #2c3e50; }
        .sidebar a { color: #ecf0f1; text-decoration: none; padding: 15px 20px; display: block; transition: 0.3s; }
        .sidebar a:hover { background-color: #34495e; border-left: 4px solid #3498db; }
        .content-area { background-color: #f8f9fa; }
        /* Estilos personalizados para el botón de logout seguro */
        .logout-btn { background: none; border: none; color: #e74c3c; cursor: pointer; padding: 15px 20px; display: block; width: 100%; text-align: left; transition: 0.3s; }
        .logout-btn:hover { background-color: #34495e; color: #c0392b; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar py-3">
            <div class="text-center mb-4">
                <h4 class="text-white"><i class="bi bi-mortarboard-fill text-info"></i> Escuela Florece</h4>
                <hr class="text-white">
            </div>
            <a href="/dashboard"><i class="bi bi-house-door me-2"></i> Inicio</a>
            <a href="/estudiantes" class="bg-dark border-start border-4 border-info"><i class="bi bi-people me-2"></i> Estudiantes</a>
            <a href="/docentes"><i class="bi bi-person-badge me-2"></i> Docentes</a>
            <a href="/cursos"><i class="bi bi-book me-2"></i> Cursos</a>
            <a href="/asistencias"><i class="bi bi-calendar-check me-2"></i> Asistencias</a>
            <a href="/pagos"><i class="bi bi-cash-coin me-2"></i> Pagos</a>
            
            <form th:action="@{/logout}" method="post" style="display: block;" class="mt-5">
                <button type="submit" class="logout-btn">
                    <i class="bi bi-box-arrow-left me-2"></i> Cerrar Sesión
                </button>
            </form>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 content-area py-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">Gestión de Estudiantes</h1>
                <button class="btn btn-primary"><i class="bi bi-plus-circle"></i> Nuevo Estudiante</button>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre Completo</th>
                                    <th>DNI / Documento</th>
                                    <th>Correo Electrónico</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>1</td>
                                    <td>Juan Pérez</td>
                                    <td>76543210</td>
                                    <td>juan.perez@email.com</td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i> Editar</button>
                                        <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i> Eliminar</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

</body>
</html>
